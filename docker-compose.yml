services:
  # Backend Laravel
  backend:
    build: ./backend
    container_name: app_locaux_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_URL=${DB_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - PAYMENT_CALLBACK_SECRET=${PAYMENT_CALLBACK_SECRET:-}
      - COMPOSER_DISABLE_NETWORK=0
      - COMPOSER_PROCESS_TIMEOUT=600
    networks:
      - plateforme_network
    restart: unless-stopped

  # Worker queue Laravel (emails/notifications/jobs)
  queue:
    build: ./backend
    container_name: app_locaux_queue
    command: php artisan queue:work --tries=3 --sleep=3 --timeout=120
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_URL=${DB_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      - PAYMENT_CALLBACK_SECRET=${PAYMENT_CALLBACK_SECRET:-}
      - QUEUE_CONNECTION=database
    networks:
      - plateforme_network
    depends_on:
      - backend
    restart: unless-stopped

  # Frontend React
  frontend:
    build: ./frontend
    container_name: app_locaux_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=${REACT_APP_API_URL:-http://localhost:8000/api}
      - REACT_APP_CLOUDINARY_CLOUD_NAME=${REACT_APP_CLOUDINARY_CLOUD_NAME:-}
      - REACT_APP_CLOUDINARY_UPLOAD_PRESET=${REACT_APP_CLOUDINARY_UPLOAD_PRESET:-}
    networks:
      - plateforme_network

  # Base de données PostgreSQL (Neon)
  # PostgreSQL est maintenant hébergé sur Neon.tech - voir .env pour la connection string

networks:
  plateforme_network:
    driver: bridge
