services:
  # Backend Laravel
  backend:
    build: ./backend
    container_name: app_locaux_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=pgsql
      - DB_URL=${DB_URL}
      - DB_HOST=${DB_HOST}
      - DB_PORT=5432
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - COMPOSER_DISABLE_NETWORK=0
      - COMPOSER_PROCESS_TIMEOUT=600
    networks:
      - plateforme_network
    restart: unless-stopped

  # Frontend React
  frontend:
    build: ./frontend
    container_name: app_locaux_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - plateforme_network

  # Base de données PostgreSQL (Neon)
  # PostgreSQL est maintenant hébergé sur Neon.tech - voir .env pour la connection string

networks:
  plateforme_network:
    driver: bridge